<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-text-size-adjust:100%}
#map{width:100%;height:100%;position:absolute;top:0;left:0}
.property-popup{min-width:280px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.property-popup h3{margin:0 0 8px 0;font-size:15px;color:#1a1a1a;border-bottom:2px solid #2563eb;padding-bottom:6px}
.property-popup .apn-badge{display:inline-block;background:#2563eb;color:white;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;margin-bottom:4px}
.property-popup .status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:8px;margin-left:4px}
.property-popup .status-badge.preview{background:#fef3c7;color:#92400e}
.property-popup .status-badge.active{background:#d1fae5;color:#065f46}
.property-popup .detail-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #f0f0f0}
.property-popup .detail-row .label{color:#666;font-weight:500}
.property-popup .detail-row .value{color:#1a1a1a;font-weight:600}
.property-popup .price{color:#059669;font-size:18px;font-weight:700}
.property-popup .bid-count{color:#2563eb;font-weight:700}
.property-popup .links{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.property-popup .links a{display:flex;align-items:center;justify-content:center;padding:8px 12px;color:white;text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;min-height:44px;transition:opacity .2s}
.property-popup .links a:hover{opacity:.85}
.property-popup .links .link-bid4assets{background:#ea580c}
.property-popup .links .link-address{background:#059669}
.property-popup .links .link-apn{background:#7c3aed}
.property-popup .links .link-tax{background:#2563eb}
.property-popup .approx-note{font-size:11px;color:#f59e0b;font-style:italic;margin-top:4px}
.legend{background:rgba(255,255,255,.95);padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.25);font-size:12px;line-height:1.5}
.legend h4{margin:0 0 4px 0;font-size:13px}
.legend .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:middle;border:1.5px solid white;box-shadow:0 0 2px rgba(0,0,0,.3)}
.legend .dot.green{background:#059669}.legend .dot.yellow{background:#f59e0b}.legend .dot.red{background:#dc2626}
.stats-box{background:rgba(255,255,255,.95);padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.25);font-size:12px}
.stats-box h4{margin:0 0 4px 0;font-size:13px}
.parcel-tooltip{background:rgba(0,0,0,.85)!important;color:#00ffff!important;border:1px solid #00ffff!important;font-size:12px;font-weight:600;padding:4px 8px!important}
.refresh-btn{background:rgba(255,255,255,.95);padding:6px 10px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.25);font-size:12px}
.refresh-btn button{background:#ea580c;color:white;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;min-height:44px}
.refresh-btn button:hover{background:#c2410c}
.refresh-btn button:disabled{background:#ccc;cursor:wait}
.refresh-btn .status{font-size:10px;color:#666;margin-top:4px;max-width:200px}
@media(max-width:768px){
.property-popup{min-width:230px;max-width:270px}
.property-popup h3{font-size:14px}
.property-popup .detail-row{font-size:12px;padding:3px 0}
.property-popup .price{font-size:16px}
.leaflet-popup-content{margin:10px 12px}
.leaflet-popup-content-wrapper{border-radius:12px}
.legend{padding:6px 8px;font-size:10px;border-radius:6px}
.legend h4{font-size:11px}
.stats-box{max-width:150px;padding:6px 8px;font-size:10px;border-radius:6px}
.stats-box h4{font-size:11px}
.refresh-btn{padding:4px 8px;border-radius:6px}
.refresh-btn .status{max-width:160px;font-size:9px}
.parcel-tooltip{display:none!important}
}
@media(max-width:390px){
.property-popup{min-width:200px;max-width:240px}
.stats-box{max-width:130px;padding:5px 6px;font-size:9px}
}
.locate-btn{background:rgba(255,255,255,.95);padding:6px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.locate-btn button{background:#2563eb;color:white;border:none;padding:8px 12px;border-radius:8px;font-size:20px;cursor:pointer;min-height:44px;min-width:44px;line-height:1;transition:background .2s}
.locate-btn button:hover{background:#1d4ed8}
.locate-btn button.locating{background:#f59e0b;animation:pulse 1s infinite}
.locate-btn button.error{background:#dc2626}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>

const ids=properties.map(p=>p.auction_id).filter(Boolean);let done=0,updated=0;
for(let i=0;i<ids.length;i+=10){
const batch=ids.slice(i,i+10);
const res=await Promise.all(batch.map(async id=>{try{const r=await fetch('https://www.bid4assets.com/auction/index/'+id);const h=await r.text();return{id,cb:parseInt(h.match(/Current BID:\s*\$([\d,]+)/)?.[1]?.replace(/,/g,'')||'0'),nb:parseInt(h.match(/Number of Bids:\s*(\d+)/)?.[1]||'0'),s:h.match(/Status:\s*(In Preview|Active|Closed|Sold)/i)?.[1]||'unknown'};}catch(e){return{id,err:1}}}));
res.forEach(r=>{if(!r.err){const idx=auctionLookup[r.id];if(idx!==undefined){properties[idx].cur_bid=r.cb||properties[idx].cur_bid;properties[idx].num_bids=r.nb;properties[idx].status=r.s;if(r.nb>0)updated++}}});
done+=batch.length;st.textContent='Fetched '+done+'/'+ids.length+'...';}
btn.disabled=false;btn.innerHTML='&#128260; Refresh Live Prices';
st.textContent='Updated '+new Date().toLocaleTimeString()+' — '+updated+' with active bids';};

const legend=L.control({position:'bottomright'});
legend.onAdd=function(){const d=L.DomUtil.create('div','legend');d.innerHTML='<h4>Cur Bid</h4><div><span class="dot green"></span> Under $50k</div><div><span class="dot yellow"></span> $50k–$150k</div><div><span class="dot red"></span> Over $150k</div><div style="margin-top:6px;border-top:1px solid #ddd;padding-top:4px"><span style="display:inline-block;width:11px;height:11px;border:2px solid #00ffff;margin-right:5px;vertical-align:middle"></span>Parcel</div>';return d};
legend.addTo(map);

const stats=L.control({position:'topright'});
stats.onAdd=function(){const d=L.DomUtil.create('div','stats-box');const t=properties.length,a=Math.round(properties.reduce((s,p)=>s+p.min_bid,0)/t),mn=Math.min(...properties.map(p=>p.min_bid)),mx=Math.max(...properties.map(p=>p.min_bid));d.innerHTML='<h4>Alameda Tax Sale</h4><div><strong>'+t+'</strong> active properties</div><div>'+fmt(mn)+' – '+fmt(mx)+'</div><div>Avg: '+fmt(a)+'</div><div style="margin-top:4px;font-size:10px;color:#666">Opens Mar 20 · Closes Mar 23</div><div style="font-size:10px"><a href="https://www.bid4assets.com/storefront/AlamedaMar26" target="_blank" style="color:#ea580c;font-weight:600">Bid4Assets &#8599;</a></div>';return d};
stats.addTo(map);

map.fitBounds(L.latLngBounds(properties.map(p=>[p.lat,p.lon])),{padding:[30,30]});

let userMarker=null,userCircle=null;
const locateCtrl=L.control({position:'topleft'});
locateCtrl.onAdd=function(){const d=L.DomUtil.create('div','locate-btn');d.innerHTML='<button id="locateBtn" title="Show my location">&#128205;</button>';L.DomEvent.disableClickPropagation(d);d.querySelector('button').addEventListener('click',doLocate);return d};
locateCtrl.addTo(map);
function doLocate(){
const btn=document.getElementById('locateBtn');
if(!navigator.geolocation){btn.classList.add('error');btn.title='Geolocation not supported';setTimeout(()=>btn.classList.remove('error'),2000);return}
btn.classList.add('locating');btn.title='Finding location...';
navigator.geolocation.getCurrentPosition(function(pos){
btn.classList.remove('locating');btn.title='Show my location';
const lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;
if(userMarker){map.removeLayer(userMarker);map.removeLayer(userCircle)}
userMarker=L.circleMarker([lat,lng],{radius:8,fillColor:'#4285F4',fillOpacity:1,color:'white',weight:3}).addTo(map).bindPopup('You are here'+(acc?' (±'+Math.round(acc)+'m)':''));
userCircle=L.circle([lat,lng],{radius:acc,fillColor:'#4285F4',fillOpacity:.1,color:'#4285F4',weight:1}).addTo(map);
map.setView([lat,lng],15);userMarker.openPopup();
},function(err){
btn.classList.remove('locating');btn.classList.add('error');btn.title=err.message;
setTimeout(()=>btn.classList.remove('error'),3000);
},{enableHighAccuracy:true,timeout:10000,maximumAge:60000})}
</script>
</body>
</html>
